<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>Golden Whale Guild</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #161b26;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      #game {
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        position: relative;
        overflow: hidden;
        touch-action: none;
      }
      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        image-rendering: pixelated;
        touch-action: none;
      }
      .gwg-panel {
        position: fixed;
        right: 16px;
        top: 72px;
        z-index: 100;
        width: min(380px, calc(100vw - 32px));
        max-height: calc(100dvh - 150px);
        overflow: hidden;
        border: 2px solid #f6c945;
        border-radius: 8px;
        background: rgba(15, 21, 33, 0.98);
        color: #fff6dc;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
        font-family: "Courier New", monospace;
        pointer-events: auto;
      }
      .gwg-panel.gwg-ledger {
        width: min(560px, calc(100vw - 32px));
      }
      .gwg-hidden {
        display: none;
      }
      .gwg-panel-head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 12px 8px;
        border-bottom: 1px solid rgba(246, 201, 69, 0.35);
        background: rgba(20, 26, 36, 0.96);
      }
      .gwg-panel-title {
        flex: 1;
        min-width: 0;
      }
      .gwg-panel-title h2 {
        margin: 0;
        color: #f6c945;
        font-size: 18px;
        line-height: 1.15;
      }
      .gwg-panel-title p {
        margin: 4px 0 0;
        color: #d4dae2;
        font-size: 12px;
        line-height: 1.25;
      }
      .gwg-panel-close {
        width: 34px;
        height: 34px;
        border: 1px solid #f6c945;
        border-radius: 6px;
        background: #273244;
        color: #fff6dc;
        font-weight: 700;
        cursor: pointer;
      }
      .gwg-panel-body {
        max-height: calc(100dvh - 230px);
        overflow-y: auto;
        padding: 10px 12px 12px;
        overscroll-behavior: contain;
        touch-action: pan-y;
      }
      .gwg-section {
        margin: 0 0 10px;
        padding: 8px;
        border: 1px solid rgba(212, 218, 226, 0.18);
        border-radius: 6px;
        background: rgba(255, 246, 220, 0.045);
      }
      .gwg-section h3 {
        margin: 0 0 5px;
        color: #ffe08a;
        font-size: 13px;
      }
      .gwg-section p,
      .gwg-section li {
        margin: 3px 0;
        color: #fff6dc;
        font-size: 12px;
        line-height: 1.35;
      }
      .gwg-muted {
        color: #d4dae2;
      }
      .gwg-good {
        color: #7fdc93;
      }
      .gwg-bad {
        color: #f0938f;
      }
      .gwg-whale {
        color: #f6c945;
      }
      .gwg-row {
        margin: 0 0 9px;
        padding: 9px;
        border: 1px solid rgba(212, 218, 226, 0.18);
        border-radius: 6px;
        background: rgba(255, 246, 220, 0.055);
      }
      .gwg-row.shady {
        border-color: rgba(246, 201, 69, 0.5);
        background: rgba(246, 201, 69, 0.08);
      }
      .gwg-row.fair {
        border-color: rgba(127, 220, 147, 0.45);
      }
      .gwg-row-title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 4px;
        color: #ffe08a;
        font-size: 13px;
        font-weight: 700;
      }
      .gwg-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }
      .gwg-action {
        min-height: 34px;
        padding: 7px 10px;
        border: 1px solid #f6c945;
        border-radius: 6px;
        background: #8a5a2b;
        color: #fff6dc;
        font-family: "Courier New", monospace;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .gwg-action:hover,
      .gwg-panel-close:hover {
        filter: brightness(1.14);
      }
      .gwg-action:disabled {
        cursor: default;
        filter: grayscale(0.6);
        opacity: 0.58;
      }
      @media (max-width: 760px), (pointer: coarse) and (orientation: portrait) {
        .gwg-panel,
        .gwg-panel.gwg-ledger {
          left: 10px;
          right: 10px;
          top: auto;
          bottom: 10px;
          width: auto;
          max-height: 58dvh;
          border-radius: 10px 10px 0 0;
        }
        .gwg-panel-body {
          max-height: calc(58dvh - 58px);
        }
        .gwg-action,
        .gwg-panel-close {
          min-height: 40px;
        }
        .gwg-panel-title h2 {
          font-size: 17px;
        }
        .gwg-section p,
        .gwg-section li,
        .gwg-row {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
