<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>Golden Whale Guild</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #161b26;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      #game {
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        position: relative;
        overflow: hidden;
        touch-action: none;
      }
      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        image-rendering: pixelated;
        touch-action: none;
      }
      .gwg-panel {
        position: fixed;
        right: 16px;
        top: 72px;
        z-index: 100;
        width: min(380px, calc(100vw - 32px));
        max-height: calc(100dvh - 150px);
        overflow: hidden;
        border: 2px solid #bf8a38;
        border-radius: 7px;
        background: rgba(20, 24, 22, 0.985);
        color: #fff6dc;
        box-shadow:
          0 0 0 2px rgba(56, 38, 21, 0.92),
          0 14px 34px rgba(0, 0, 0, 0.5);
        font-family: "Courier New", monospace;
        pointer-events: auto;
      }
      .gwg-panel.gwg-ledger {
        width: min(560px, calc(100vw - 32px));
      }
      .gwg-panel.gwg-build-catalog {
        left: 50%;
        right: auto;
        top: 64px;
        width: min(1080px, calc(100vw - 48px));
        height: min(650px, calc(100dvh - 118px));
        max-height: none;
        transform: translateX(-50%);
      }
      .gwg-panel.gwg-town-ledger {
        left: 50%;
        right: auto;
        top: 68px;
        width: min(880px, calc(100vw - 48px));
        height: min(620px, calc(100dvh - 126px));
        max-height: none;
        transform: translateX(-50%);
      }
      .gwg-town-ledger .gwg-panel-body {
        box-sizing: border-box;
        height: calc(100% - 61px);
        max-height: none;
        padding: 10px;
      }
      .gwg-build-catalog .gwg-panel-body {
        box-sizing: border-box;
        height: calc(100% - 61px);
        max-height: none;
        overflow: hidden;
        padding: 0;
      }
      .gwg-hidden {
        display: none;
      }
      .gwg-panel-head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 11px 12px 9px;
        border-bottom: 1px solid rgba(218, 167, 79, 0.42);
        background: rgba(46, 35, 25, 0.97);
        box-shadow: inset 0 -2px 0 rgba(10, 12, 11, 0.46);
      }
      .gwg-panel-title {
        flex: 1;
        min-width: 0;
      }
      .gwg-panel-title h2 {
        margin: 0;
        color: #f6c945;
        font-size: 18px;
        line-height: 1.15;
      }
      .gwg-panel-title p {
        margin: 4px 0 0;
        color: #d4dae2;
        font-size: 12px;
        line-height: 1.25;
      }
      .gwg-panel-close {
        width: 34px;
        height: 34px;
        border: 1px solid #d5a54e;
        border-radius: 6px;
        background: #493626;
        color: #fff6dc;
        font-weight: 700;
        cursor: pointer;
      }
      .gwg-panel-body {
        max-height: calc(100dvh - 230px);
        overflow-y: auto;
        padding: 10px 12px 12px;
        overscroll-behavior: contain;
        touch-action: pan-y;
      }
      .gwg-section {
        margin: 0 0 10px;
        padding: 8px;
        border: 1px solid rgba(212, 218, 226, 0.18);
        border-radius: 6px;
        background: rgba(255, 246, 220, 0.045);
      }
      .gwg-tabs {
        position: sticky;
        top: -10px;
        z-index: 2;
        display: flex;
        gap: 6px;
        margin: -10px -12px 10px;
        padding: 10px 12px 9px;
        overflow-x: auto;
        background: rgba(15, 21, 33, 0.98);
        border-bottom: 1px solid rgba(246, 201, 69, 0.25);
        scrollbar-width: thin;
        touch-action: pan-x;
      }
      .gwg-tab {
        flex: 0 0 auto;
        min-height: 34px;
        padding: 6px 9px;
        border: 1px solid rgba(212, 218, 226, 0.34);
        border-radius: 6px;
        background: #273244;
        color: #d4dae2;
        font-family: "Courier New", monospace;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }
      .gwg-tab.active {
        border-color: #f6c945;
        background: #8a5a2b;
        color: #fff6dc;
      }
      .gwg-section h3 {
        margin: 0 0 5px;
        color: #ffe08a;
        font-size: 13px;
      }
      .gwg-section p,
      .gwg-section li {
        margin: 3px 0;
        color: #fff6dc;
        font-size: 12px;
        line-height: 1.35;
      }
      .gwg-inline-icon {
        width: 24px;
        height: 24px;
        margin-right: 7px;
        vertical-align: middle;
        image-rendering: pixelated;
        object-fit: contain;
      }
      .gwg-muted {
        color: #d4dae2;
      }
      .gwg-good {
        color: #7fdc93;
      }
      .gwg-bad {
        color: #f0938f;
      }
      .gwg-whale {
        color: #f6c945;
      }
      .gwg-row {
        margin: 0 0 9px;
        padding: 9px;
        border: 1px solid rgba(212, 218, 226, 0.18);
        border-radius: 6px;
        background: rgba(255, 246, 220, 0.055);
      }
      .gwg-row.shady {
        border-color: rgba(246, 201, 69, 0.5);
        background: rgba(246, 201, 69, 0.08);
      }
      .gwg-row.fair {
        border-color: rgba(127, 220, 147, 0.45);
      }
      .gwg-row-title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 4px;
        color: #ffe08a;
        font-size: 13px;
        font-weight: 700;
      }
      .gwg-row-layout {
        display: grid;
        grid-template-columns: 62px minmax(0, 1fr);
        gap: 9px;
        align-items: start;
      }
      .gwg-row-content {
        min-width: 0;
      }
      .gwg-row p {
        margin: 3px 0;
        font-size: 12px;
        line-height: 1.32;
      }
      .gwg-build-preview,
      .gwg-road-swatch {
        width: 58px;
        height: 58px;
        border: 1px solid rgba(255, 246, 220, 0.2);
        border-radius: 5px;
        background: rgba(255, 246, 220, 0.05);
        image-rendering: pixelated;
        object-fit: contain;
      }
      .gwg-build-preview-fallback {
        display: grid;
        place-items: center;
        color: rgba(255, 246, 220, 0.32);
        font-size: 22px;
      }
      .gwg-road-swatch {
        position: relative;
        background: rgba(111, 174, 78, 0.35);
      }
      .gwg-road-swatch::before,
      .gwg-road-swatch::after {
        content: "";
        position: absolute;
        background: var(--gwg-swatch);
      }
      .gwg-road-swatch::before {
        left: 20px;
        top: 0;
        width: 18px;
        height: 58px;
      }
      .gwg-road-swatch::after {
        left: 0;
        top: 20px;
        width: 58px;
        height: 18px;
      }
      .gwg-build-shell {
        display: grid;
        grid-template-columns: 168px minmax(0, 1fr);
        height: 100%;
        min-height: 0;
      }
      .gwg-build-categories {
        display: flex;
        flex-direction: column;
        gap: 7px;
        padding: 11px 10px;
        overflow-y: auto;
        border-right: 1px solid rgba(246, 201, 69, 0.25);
        background: rgba(37, 31, 25, 0.84);
        overscroll-behavior: contain;
        touch-action: pan-y;
      }
      .gwg-build-category {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex: 0 0 auto;
        min-height: 38px;
        padding: 7px 9px;
        border: 1px solid rgba(196, 169, 126, 0.3);
        border-radius: 5px;
        background: #292d29;
        color: #d9d2c3;
        font-family: "Courier New", monospace;
        font-size: 12px;
        font-weight: 700;
        text-align: left;
        cursor: pointer;
        transition: border-color 100ms ease, background-color 100ms ease, transform 100ms ease;
      }
      .gwg-build-category small {
        min-width: 22px;
        padding: 2px 4px;
        border-radius: 4px;
        background: rgba(8, 10, 9, 0.38);
        color: #bdb4a4;
        font-size: 10px;
        text-align: center;
      }
      .gwg-build-category:hover {
        border-color: rgba(246, 201, 69, 0.58);
        transform: translateX(1px);
      }
      .gwg-build-category.active {
        border-color: #f6c945;
        background: #795127;
        color: #fff6dc;
        box-shadow: inset 3px 0 0 #f6c945;
      }
      .gwg-build-category.active small {
        color: #ffe08a;
      }
      .gwg-build-content {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-width: 0;
        min-height: 0;
      }
      .gwg-build-category-copy {
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 9px 12px 8px;
        border-bottom: 1px solid rgba(212, 218, 226, 0.14);
        background: rgba(113, 84, 47, 0.12);
      }
      .gwg-build-category-copy > div {
        display: flex;
        align-items: baseline;
        gap: 7px;
      }
      .gwg-build-category-copy strong {
        flex: 0 0 auto;
        color: #ffe08a;
        font-size: 13px;
      }
      .gwg-build-category-copy span {
        overflow: hidden;
        color: #d4dae2;
        font-size: 11px;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .gwg-build-category-copy small {
        color: #a9a18f;
        font-size: 10px;
        white-space: nowrap;
      }
      .gwg-build-workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 302px;
        min-height: 0;
      }
      .gwg-build-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: min-content;
        gap: 10px;
        align-content: start;
        min-height: 0;
        overflow-y: auto;
        padding: 11px;
        overscroll-behavior: contain;
        touch-action: pan-y;
      }
      .gwg-build-card {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 212px;
        padding: 9px;
        border: 1px solid rgba(196, 184, 163, 0.24);
        border-radius: 6px;
        background: rgba(255, 246, 220, 0.045);
        box-shadow: inset 0 1px 0 rgba(255, 246, 220, 0.035);
        transition: border-color 100ms ease, background-color 100ms ease, transform 100ms ease;
      }
      .gwg-build-card:hover {
        border-color: rgba(246, 201, 69, 0.48);
        background: rgba(255, 246, 220, 0.07);
        transform: translateY(-1px);
      }
      .gwg-build-card.shady {
        border-color: rgba(246, 201, 69, 0.42);
        background: rgba(246, 201, 69, 0.07);
      }
      .gwg-build-card.selected {
        border-color: #f6c945;
        background: rgba(246, 201, 69, 0.09);
        box-shadow:
          inset 0 0 0 1px rgba(246, 201, 69, 0.44),
          0 3px 10px rgba(0, 0, 0, 0.2);
      }
      .gwg-build-card.locked,
      .gwg-build-card.built {
        opacity: 0.72;
      }
      .gwg-build-card.unaffordable {
        opacity: 0.78;
      }
      .gwg-build-card-summary {
        display: grid;
        grid-template-columns: 60px minmax(0, 1fr);
        gap: 9px;
        width: 100%;
        padding: 0;
        border: 0;
        background: transparent;
        color: inherit;
        font-family: inherit;
        text-align: left;
        cursor: pointer;
      }
      .gwg-catalog-preview {
        width: 58px;
        height: 58px;
        border: 1px solid rgba(255, 246, 220, 0.18);
        border-radius: 5px;
        background: rgba(104, 91, 69, 0.18);
        image-rendering: pixelated;
        object-fit: contain;
      }
      .gwg-catalog-preview.fallback {
        display: grid;
        place-items: center;
        color: rgba(255, 246, 220, 0.3);
        font-size: 20px;
      }
      .gwg-catalog-preview.large {
        width: 88px;
        height: 88px;
      }
      .gwg-catalog-road {
        position: relative;
        display: block;
        background: rgba(111, 174, 78, 0.32);
      }
      .gwg-catalog-road::before,
      .gwg-catalog-road::after {
        content: "";
        position: absolute;
        background: var(--gwg-swatch);
      }
      .gwg-catalog-road::before {
        left: 18px;
        top: 0;
        width: 16px;
        height: 100%;
      }
      .gwg-catalog-road::after {
        left: 0;
        top: 18px;
        width: 100%;
        height: 16px;
      }
      .gwg-catalog-road.large::before {
        left: 31px;
        width: 24px;
      }
      .gwg-catalog-road.large::after {
        top: 31px;
        height: 24px;
      }
      .gwg-build-card-heading {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .gwg-build-card-heading strong {
        color: #ffe08a;
        font-size: 13px;
        line-height: 1.25;
      }
      .gwg-build-card-meta,
      .gwg-build-detail-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
      }
      .gwg-build-card-cost {
        color: #f6c945;
        font-size: 11px;
        font-weight: 700;
      }
      .gwg-build-card-facts,
      .gwg-build-detail-facts {
        margin: 7px 0 0;
      }
      .gwg-build-card-facts div,
      .gwg-build-detail-facts div {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin: 2px 0;
      }
      .gwg-build-card-facts dt,
      .gwg-build-detail-facts dt {
        color: #9faaba;
        font-size: 11px;
      }
      .gwg-build-card-facts dd,
      .gwg-build-detail-facts dd {
        margin: 0;
        color: #fff6dc;
        font-size: 11px;
        text-align: right;
      }
      .gwg-build-card-effect,
      .gwg-build-card-status {
        display: -webkit-box;
        overflow: hidden;
        margin: 6px 0 0;
        font-size: 11px;
        line-height: 1.3;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
      .gwg-build-card-action {
        width: 100%;
        margin-top: auto;
        padding-top: 7px;
      }
      .gwg-build-detail {
        min-width: 0;
        overflow-y: auto;
        padding: 0;
        border-left: 1px solid rgba(246, 201, 69, 0.24);
        background: rgba(35, 30, 25, 0.62);
        overscroll-behavior: contain;
        touch-action: pan-y;
      }
      .gwg-build-detail-fold {
        min-height: 100%;
      }
      .gwg-build-detail-fold > summary {
        display: none;
      }
      .gwg-build-detail-content {
        padding: 13px;
      }
      .gwg-build-detail-head {
        display: grid;
        grid-template-columns: 90px minmax(0, 1fr);
        gap: 9px;
        align-items: center;
      }
      .gwg-build-detail h3 {
        margin: 0 0 6px;
        color: #ffe08a;
        font-size: 17px;
        line-height: 1.2;
      }
      .gwg-build-detail p {
        margin: 8px 0;
        font-size: 12px;
        line-height: 1.42;
      }
      .gwg-build-detail h4 {
        margin: 13px 0 6px;
        color: #c9b88f;
        font-size: 11px;
        text-transform: uppercase;
      }
      .gwg-detail-kicker {
        display: block;
        margin-bottom: 4px;
        color: #9fa894;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .gwg-build-detail-cost {
        color: #f6c945;
        font-size: 12px;
      }
      .gwg-build-flavor {
        padding: 8px;
        border-left: 2px solid rgba(246, 201, 69, 0.52);
        background: rgba(8, 10, 9, 0.22);
        color: #d7cfbf;
        font-style: italic;
      }
      .gwg-build-detail-status {
        font-weight: 700;
      }
      .gwg-build-detail-empty {
        color: #d4dae2;
        font-size: 12px;
      }
      .gwg-build-footer {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 40px;
        padding: 7px 10px;
        border-top: 1px solid rgba(212, 218, 226, 0.14);
        background: rgba(37, 31, 25, 0.9);
      }
      .gwg-state-badge {
        display: inline-flex;
        align-items: center;
        min-height: 18px;
        padding: 1px 5px;
        border: 1px solid rgba(212, 218, 226, 0.25);
        border-radius: 4px;
        background: rgba(12, 14, 13, 0.38);
        color: #c8c2b6;
        font-size: 9px;
        font-weight: 700;
      }
      .gwg-state-badge.affordable {
        border-color: rgba(127, 220, 147, 0.6);
        color: #a7edb4;
      }
      .gwg-state-badge.unaffordable {
        border-color: rgba(240, 147, 143, 0.42);
        color: #efb0a9;
      }
      .gwg-state-badge.locked {
        color: #aaa59b;
      }
      .gwg-state-badge.built,
      .gwg-state-badge.maxed {
        border-color: rgba(246, 201, 69, 0.5);
        color: #ffe08a;
      }
      .gwg-ledger-summary {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 10px;
      }
      .gwg-ledger-summary > div {
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding: 8px 10px;
        border: 1px solid rgba(196, 184, 163, 0.22);
        border-radius: 6px;
        background: rgba(255, 246, 220, 0.04);
      }
      .gwg-ledger-summary .fair {
        border-left: 3px solid #7fdc93;
      }
      .gwg-ledger-summary .shady {
        border-left: 3px solid #f6c945;
      }
      .gwg-ledger-summary strong {
        color: #ffe08a;
        font-size: 12px;
      }
      .gwg-ledger-summary span {
        color: #c8c2b6;
        font-size: 10px;
        line-height: 1.3;
      }
      .gwg-ledger-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .gwg-ledger-item {
        display: grid;
        grid-template-columns: 58px minmax(0, 1fr) 142px;
        gap: 10px;
        align-items: start;
        padding: 9px;
        border: 1px solid rgba(196, 184, 163, 0.22);
        border-radius: 6px;
        background: rgba(255, 246, 220, 0.045);
      }
      .gwg-ledger-item.shady {
        border-left: 3px solid rgba(246, 201, 69, 0.72);
      }
      .gwg-ledger-item.fair {
        border-left: 3px solid rgba(127, 220, 147, 0.66);
      }
      .gwg-ledger-item.locked {
        opacity: 0.7;
      }
      .gwg-ledger-preview {
        display: block;
        width: 56px;
        height: 56px;
        border: 1px solid rgba(196, 184, 163, 0.24);
        border-radius: 5px;
        background: rgba(104, 91, 69, 0.18);
        image-rendering: pixelated;
        object-fit: contain;
      }
      .gwg-ledger-preview.fallback {
        display: grid;
        place-items: center;
        color: #9fa894;
        font-size: 18px;
        font-weight: 700;
      }
      .gwg-ledger-copy {
        min-width: 0;
      }
      .gwg-ledger-title {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }
      .gwg-ledger-title h3 {
        margin: 0;
        color: #ffe08a;
        font-size: 13px;
        line-height: 1.2;
      }
      .gwg-ledger-title > div > span {
        color: #aaa697;
        font-size: 10px;
      }
      .gwg-ledger-effects {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 6px;
      }
      .gwg-ledger-effects p {
        margin: 0;
        color: #e9e2d2;
        font-size: 11px;
        line-height: 1.35;
      }
      .gwg-ledger-effects strong {
        display: block;
        margin-bottom: 2px;
        color: #9fa894;
        font-size: 9px;
        text-transform: uppercase;
      }
      .gwg-ledger-flavor {
        margin: 6px 0 0;
        color: #bdb5a7;
        font-size: 11px;
        font-style: italic;
        line-height: 1.3;
      }
      .gwg-ledger-decision {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        min-width: 0;
        text-align: right;
      }
      .gwg-ledger-decision > strong {
        color: #f6c945;
        font-size: 14px;
      }
      .gwg-ledger-decision > span {
        display: -webkit-box;
        overflow: hidden;
        color: #aaa697;
        font-size: 10px;
        line-height: 1.25;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
      .gwg-ledger-decision .gwg-action {
        width: 100%;
        margin-top: auto;
      }
      .gwg-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }
      .gwg-action {
        min-height: 34px;
        padding: 7px 10px;
        border: 1px solid #f6c945;
        border-radius: 6px;
        background: #8a5a2b;
