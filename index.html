<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>Golden Whale Guild</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #161b26;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      #game {
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        position: relative;
        overflow: hidden;
        touch-action: none;
      }
      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        image-rendering: pixelated;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
